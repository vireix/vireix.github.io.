<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ПОДБОРКИН</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root { --main:#6c5ce7; --bg:#f5f6fa; }

body {margin:0;font-family:-apple-system;background:var(--bg);}

header {
  background:#fff;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.logo {display:flex;align-items:center;gap:15px;}

.cart {
  background:#fff;
  padding:6px 12px;
  border-radius:20px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.searchBox {position:relative;flex:1;max-width:400px;}

.searchBox input {
  width:100%;
  padding:10px 10px 10px 35px;
  border-radius:10px;
  border:1px solid #ddd;
}

.icon {
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
}

.categories {display:flex;flex-wrap:wrap;gap:8px;padding:10px;}

.categories button {
  padding:8px 12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#fff;
}

.categories .active {background:var(--main);color:#fff;}

.container {display:flex;}

.sidebar {width:230px;padding:15px;}

.box {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.content {flex:1;padding:15px;}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}

.card {
  background:#fff;
  padding:10px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,.05);
  transition:.2s;
}

.card:hover {transform:translateY(-5px);}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

.price {font-weight:bold;}

.card button {
  margin-top:5px;
  width:100%;
  padding:6px;
  border:none;
  border-radius:8px;
  background:var(--main);
  color:#fff;
  cursor:pointer;
}

max-width:768px{
.container{flex-direction:column}
.sidebar{width:100%}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <h1>ПОДБОРКИН</h1>
    <div class="cart" onclick="openCart()">🛒 <span id="cartCount">0</span></div>
  </div>

  <div class="searchBox">
    <span class="icon">🔍</span>
    <input id="search" placeholder="Введите категорию">
  </div>
</header>

<div id="cats" class="categories"></div>

<div class="container">

<div class="sidebar">
<div class="box">
Цена до: <b id="priceVal">200000</b>

<input type="range" id="price" min="1000" max="200000" value="200000">
</div>

<div class="box">
Доставка до: <b id="deliveryVal">10</b>

<input type="range" id="delivery" min="1" max="10" value="10">
</div>
</div>

<div class="content">
<div id="products" class="grid"></div>
</div>

</div>

<script>

{name:"New Bal


ance 574",price:11000,delivery:5,img:img(21)},

{name:"Wireless Charger",price:3500,delivery:3,img:img(60)}
]

};

let current="телефоны";

const pDiv=document.getElementById("products");
const cats=document.getElementById("cats");

Object.keys(data).forEach(c=>{
let b=document.createElement("button");
b.innerText=c;
b.onclick=()=>{
current=c;
render();
document.querySelectorAll(".categories button").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
};
cats.appendChild(b);
});
cats.children[0].classList.add("active");

function render(){
pDiv.innerHTML="";
data[current]
.filter(i=>i.price<=price.value && i.delivery<=delivery.value)
.forEach(i=>{
pDiv.innerHTML+=`
<div class="card">
<img src="${i.img}">
<div>${i.name}</div>
<div class="price">${i.price} ₽</div>
<div>${i.delivery} дней</div>
<button onclick="add()">В корзину</button>
</div>`;
});
}

function add(){
cart++;
document.getElementById("cartCount").innerText=cart;
}

function openCart(){
alert("В корзине товаров: "+cart);
}

search.oninput=e=>{
if(data[e.target.value]){current=e.target.value;render();}
};

price.oninput=()=>{priceVal.innerText=price.value;render();}
delivery.oninput=()=>{deliveryVal.innerText=delivery.value;render();}

render();
</script>

</body>
</html>
