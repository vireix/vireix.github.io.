<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПОДБОРКИН - Маркетплейс</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        margin: 0;
    }
    .sidebar {
        width: 250px;
        padding: 20px;
        background-color: #f5f5f5;
        border-right: 1px solid #ccc;
    }
    .main {
        flex: 1;
        padding: 20px;
    }
    h2 {
        margin-top: 0;
    }
    .product {
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
    }
    label {
        display: block;
        margin-top: 10px;
    }
    input[type="number"], input[type="text"] {
        width: 100%;
        padding: 5px;
    }
    button {
        margin-top: 10px;
        padding: 5px 10px;
    }
</style>
</head>
<body>

<div class="sidebar">
    <h2>Фильтры</h2>
    <label>Цена от:
        <input type="number" id="minPrice" placeholder="0">
    </label>
    <label>Цена до:
        <input type="number" id="maxPrice" placeholder="1000">
    </label>
    <label>Время доставки (дней):
        <input type="number" id="deliveryTime" placeholder="7">
    </label>
    <label>Поиск:
        <input type="text" id="searchTerm" placeholder="Ключевое слово">
    </label>
    <button onclick="applyFilters()">Применить фильтры</button>
</div>

<div class="main">
    <h2>Товары</h2>
    <div id="productList"></div>
</div>

<script>
const products = [
    {name: "Смартфон", price: 300, delivery: 3, tags: ["электроника", "телефон"]},
    {name: "Ноутбук", price: 800, delivery: 5, tags: ["электроника", "компьютер"]},
    {name: "Книга", price: 20, delivery: 2, tags: ["книги", "образование"]},
    {name: "Наушники", price: 50, delivery: 4, tags: ["электроника", "звук"]},
    {name: "Рюкзак", price: 40, delivery: 3, tags: ["одежда", "сумки"]}
];

function displayProducts(filteredProducts) {
    const container = document.getElementById('productList');
    container.innerHTML = "";
    if (filteredProducts.length === 0) {
        container.innerHTML = "<p>Нет товаров по выбранным фильтрам.</p>";
        return;
    }
    filteredProducts.forEach(product => {
        const div = document.createElement('div');
        div.className = "product";
        div.innerHTML = `<strong>${product.name}</strong>
Цена: $${product.price}
Доставка: ${product.delivery} дня(д)`;
        container.appendChild(div);
    });
}

function applyFilters() {
    const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
    const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
    const deliveryTime = parseFloat(document.getElementById('deliveryTime').value) || Infinity;
    const searchTerm = document.getElementById('searchTerm').value.toLowerCase();

    const filtered = products.filter(p => 
        p.price >= minPrice &&
        p.price <= maxPrice &&
        p.delivery <= deliveryTime &&
        (p.name.toLowerCase().includes(searchTerm) || p.tags.some(tag => tag.includes(searchTerm)))
    );

    displayProducts(filtered);
}

// Показать все товары при загрузке
displayProducts(products);
</script>

</body>
</html>
